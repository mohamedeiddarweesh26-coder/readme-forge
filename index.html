<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprintly</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <link rel="stylesheet" href="First.css">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <p class="splash-welcome">Welcome to</p>
            <h1 class="splash-title">Blueprintly</h1>
        </div>
    </div>
    <header>
        <h1>Blueprintly</h1>
        <p>Fill in your details and get a README instantly</p>
    </header>
    <main>
        <section id="form-panel">
        <div class="input-group">
            <label>Project Name</label>
            <input type="text" id="projectName" placeholder="My Awesome Project">
        </div>
        <div class="input-group">
            <label>Description</label>
            <textarea id="description" placeholder="What does your project do?"></textarea>
        </div>
        <div class="input-group">
            <label>Technologies</label>
            <div id="tech-checkboxes">
                <label><input type="checkbox" value="HTML"> HTML</label>
                <label><input type="checkbox" value="CSS"> CSS</label>
                <label><input type="checkbox" value="JavaScript"> JavaScript</label>
                <label><input type="checkbox" value="Python"> Python</label>
                <label><input type="checkbox" value="React"> React</label>
                <label><input type="checkbox" value="Node.js"> Node.js</label>
            </div>
        </div>
        <div class="input-group">
            <label>Demo Link</label>
            <input type="text" id="demoLink" placeholder="https://myproject.com">
        </div>
        <div class="input-group">
            <label>GitHub Username</label>
            <input type="text" id="githubUsername" placeholder="your-username">
        </div>
        <button id="generateBtn">Generate README</button>
        </section>
        <section id="preview-panel">
            <div id="preview-header">
                <h2>Preview</h2>
                <span id="live-badge">&#9679; Live</span>
                <div id="preview-content">
                    <p id="placeholder-text">Start filling the form to see your README here...</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <button id="downloadBtn">&#11015; Download README.md</button>
        <button id="copyBtn">&#128203; Copy</button>
        <p>Made by Mohamed Eid</p>
    </footer>
    <script src="First.js"></script>
</body>
</html>
